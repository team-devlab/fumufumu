name: Frontend Code Check (Biome & Tests)

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/fumufumu-frontend/**'
      - '.github/workflows/fe-code-check.yml'

jobs:
  frontend_quality:
    name: Biome, Vitest & Webpack Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/fumufumu-frontend/
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v6
        with:
          node-version: 20
      
      - name: Enable pnpm via Corepack
        # Node.js がインストールされている環境で pnpm を有効化
        run: corepack enable
      
      - name: Install dependencies
        # pnpm-workspace.yamlがあるため pnpm install を実行し、依存関係を解決
        run: pnpm install --frozen-lockfile

      # Biomeのセットアップ（バージョンを自動検出）
      - name: Setup Biome CLI
        uses: biomejs/setup-biome@v2
        with:
          working-dir: apps/fumufumu-frontend
          version: 2.4.4

      # format, lint, organize imports のチェックを同時に実行（ファイルへの書き込みは行わない）
      - name: Run Biome CI
        run: pnpm exec biome ci
      
      - name: Run Vitest Tests
        run: pnpm test

      # PR の必須品質ゲートは安定性を優先して webpack build を本線にする
      - name: Run Next.js Build (Webpack)
        run: pnpm build

      # Turbopack は将来移行に向けた監視目的で実行し、当面は non-blocking にする
      - name: Run Next.js Build (Turbopack monitor)
        continue-on-error: true
        run: pnpm exec next build
